services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 15 + PostGIS 3
  # ---------------------------------------------------------------------------
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    # NOTE: no container_name — a fixed name is global and ignores `-p <project>`,
    # so it would collide across parallel agent worktrees. Compose derives a
    # project-scoped name automatically (<project>-postgres-1).
    restart: unless-stopped
    environment:
      POSTGRES_USER: imoveis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-imoveis_local_dev}
      POSTGRES_DB: realestate
    ports:
      # Host port is parametrized; defaults preserve single-instance behavior.
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imoveis -d realestate"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---------------------------------------------------------------------------
  # FastAPI backend
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql://imoveis:${POSTGRES_PASSWORD:-imoveis_local_dev}@postgres:5432/realestate
      REDIS_URL: redis://redis:6379/0
      # Point Ollama to host machine (Ollama runs on Windows host, not in Docker)
      OLLAMA_HOST: http://host.docker.internal:11434
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./configs:/app/configs
      - image_store:/app/data/images

  # ---------------------------------------------------------------------------
  # Celery AI-enrichment worker
  # ---------------------------------------------------------------------------
  worker_ai:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    command: >
      celery -A adapters.queue.tasks worker
      --loglevel=info
      --queues=ai
      --concurrency=1
    environment:
      DATABASE_URL: postgresql://imoveis:${POSTGRES_PASSWORD:-imoveis_local_dev}@postgres:5432/realestate
      REDIS_URL: redis://redis:6379/0
      OLLAMA_HOST: http://host.docker.internal:11434
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./configs:/app/configs
      - image_store:/app/data/images

  # ---------------------------------------------------------------------------
  # Celery beat — scheduled scrape dispatcher
  # ---------------------------------------------------------------------------
  beat:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    command: >
      celery -A adapters.queue.tasks beat
      --loglevel=info
      --scheduler adapters.queue.redis_scheduler.RedisAwareScheduler
    environment:
      DATABASE_URL: postgresql://imoveis:${POSTGRES_PASSWORD:-imoveis_local_dev}@postgres:5432/realestate
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./configs:/app/configs

  # ---------------------------------------------------------------------------
  # Celery scraper worker
  # ---------------------------------------------------------------------------
  worker_scraper:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    command: >
      celery -A adapters.queue.tasks worker
      --loglevel=info
      --queues=scrapers
      --concurrency=2
    environment:
      DATABASE_URL: postgresql://imoveis:${POSTGRES_PASSWORD:-imoveis_local_dev}@postgres:5432/realestate
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./configs:/app/configs

  # ---------------------------------------------------------------------------
  # Ollama Models Init
  # ---------------------------------------------------------------------------
  ollama_init:
    image: curlimages/curl:latest
    restart: "no"
    command: ["sh", "-c", "curl -sS -X POST http://host.docker.internal:11434/api/pull -d '{\"name\": \"llama3\"}' && curl -sS -X POST http://host.docker.internal:11434/api/pull -d '{\"name\": \"llava\"}'"]

volumes:
  postgres_data:
  redis_data:
  image_store:
