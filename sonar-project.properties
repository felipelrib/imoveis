# SonarQube Cloud — CI-based analysis (not Automatic Analysis).
# Presence of this file also signals CI-based setup to SonarCloud.
sonar.projectKey=felipelrib_imoveis
sonar.organization=felipelrib
sonar.sources=src/
sonar.tests=src/tests/
sonar.python.version=3.11
sonar.python.coverage.reportPaths=coverage.xml
sonar.exclusions=**/migrations/**,**/alembic/**
sonar.test.inclusions=**/tests/**
# Integration/worker modules are exercised outside unit coverage.xml
sonar.coverage.exclusions=\
  **/alembic/**,\
  **/adapters/queue/tasks.py,\
  **/adapters/notify/**,\
  **/adapters/db/models.py
