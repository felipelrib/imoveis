# =============================================================================
# Application Configuration — Single Source of Truth
# =============================================================================
# Environment variable overrides:
#   DATABASE_URL  — PostgreSQL connection string
#   REDIS_URL     — Redis connection string
#   AI_MODEL      — Override the default VLM model name
#   API_KEY       — API edge credential (auth.api_key)
#   JWT_SECRET    — JWT signing secret (auth.jwt_secret)
#   ADMIN_USER / ADMIN_PASS — admin login (auth.admin_*)
#   IMOVEIS_AUTH__* — generic auth overrides (e.g. IMOVEIS_AUTH__PRINCIPAL_ID)

database: {}

# ---------------------------------------------------------------------------
# API edge auth (BIN-44) — secrets via env only; never commit real values
# ---------------------------------------------------------------------------
auth:
  api_key: ""
  jwt_secret: ""
  principal_id: default
  admin_user: admin
  admin_pass: admin

redis_url: redis://localhost:6379/0

# ---------------------------------------------------------------------------
# Platform Scrapers
# ---------------------------------------------------------------------------
scraping:
  platforms:
    quintoandar:
      base_url: https://www.quintoandar.com.br/alugar/imovel/belo-horizonte-mg-brasil
      enabled: true
      scrape_interval: 60      # minutes between scheduled scrapes (0 = manual only)
      rate_limit: 30          # requests per minute
      jitter_min: 2           # minimum delay between requests (seconds)
      jitter_max: 7           # maximum delay between requests (seconds)
      extra:
        city_slug: belo-horizonte-mg-brasil
        price_rent: [500, 15000]
        price_sale: [100000, 5000000]
        # Fan-out only when a price band is atomic and still ≥12 results
        neighborhoods:
          - { slug: savassi }
          - { slug: lourdes }
          - { slug: funcionarios }
          - { slug: centro }
          - { slug: santo-agostinho }
          - { slug: serra }
          - { slug: sion }
          - { slug: cruzeiro }
          - { slug: anchieta }
          - { slug: belvedere }
          - { slug: santo-antonio }
          - { slug: carmo }
          - { slug: santa-efigenia }
          - { slug: floresta }
          - { slug: santa-tereza }
          - { slug: buritis }
          - { slug: gutierrez }
          - { slug: prado }
          - { slug: barro-preto }
          - { slug: castelo }
          - { slug: ouro-preto }
          - { slug: bandeirantes }
          - { slug: sao-luiz }
          - { slug: caicaras }
          - { slug: carlos-prates }
          - { slug: planalto }
          - { slug: cidade-nova }
          - { slug: venda-nova }
          - { slug: barreiro }
          - { slug: nova-suissa }
          - { slug: calafate }
          - { slug: mangabeiras }
          - { slug: luxemburgo }
          - { slug: santo-andre }
          - { slug: bonfim }
        # null → use global proxy: block; non-null URL → fixed override (no rotation)
        proxy: null
    olx:
      base_url: https://www.olx.com.br
      enabled: true
      scrape_interval: 60      # minutes between scheduled scrapes (0 = manual only)
      rate_limit: 20
      jitter_min: 2
      jitter_max: 6
      extra:
        max_pages: 5
        page_size_hint: 50
        region: estado-mg
        city_slug: belo-horizonte-e-regiao
        price_rent: [500, 15000]
        price_sale: [100000, 5000000]
        # Fan-out only when a price band is atomic and still saturates max_pages
        neighborhoods:
          - { slug: savassi, zone: centro-sul }
          - { slug: lourdes, zone: centro-sul }
          - { slug: funcionarios, zone: centro-sul }
          - { slug: centro, zone: centro-sul }
          - { slug: santo-agostinho, zone: centro-sul }
          - { slug: serra, zone: centro-sul }
          - { slug: sion, zone: centro-sul }
          - { slug: cruzeiro, zone: centro-sul }
          - { slug: anchieta, zone: centro-sul }
          - { slug: belvedere, zone: centro-sul }
          - { slug: santo-antonio, zone: centro-sul }
          - { slug: carmo, zone: centro-sul }
          - { slug: mangabeiras, zone: centro-sul }
          - { slug: luxemburgo, zone: centro-sul }
          - { slug: santa-efigenia, zone: zona-leste }
          - { slug: floresta, zone: zona-leste }
          - { slug: santa-tereza, zone: zona-leste }
          - { slug: horto, zone: zona-leste }
          - { slug: buritis, zone: oeste }
          - { slug: gutierrez, zone: oeste }
          - { slug: prado, zone: oeste }
          - { slug: barro-preto, zone: oeste }
          - { slug: nova-suissa, zone: oeste }
          - { slug: calafate, zone: oeste }
          - { slug: castelo, zone: pampulha }
          - { slug: ouro-preto, zone: pampulha }
          - { slug: bandeirantes, zone: pampulha }
          - { slug: sao-luiz, zone: pampulha }
          - { slug: caicaras, zone: noroeste }
          - { slug: carlos-prates, zone: noroeste }
          - { slug: bonfim, zone: noroeste }
          - { slug: santo-andre, zone: noroeste }
          - { slug: planalto, zone: venda-nova }
          - { slug: cidade-nova, zone: nordeste }
          - { slug: venda-nova, zone: venda-nova }
          - { slug: barreiro, zone: barreiro }
        # null → use global proxy: block; non-null URL → fixed override (no rotation)
        proxy: null

# ---------------------------------------------------------------------------
# Deduplication Engine
# ---------------------------------------------------------------------------
dedup:
  radius_m: 50.0                    # geospatial proximity radius in meters
  area_tolerance_m2: 2.0            # ±m² tolerance for usable area matching
  text_similarity_threshold: 0.65   # minimum similarity score to consider duplicate
  text_similarity_algorithm: jaro_winkler  # jaro_winkler | token_sort

# ---------------------------------------------------------------------------
# Scoring Engine
# ---------------------------------------------------------------------------
scoring:
  stat_weight: 0.5    # weight for statistical z-score/percentile component
  ai_weight: 0.5      # weight for AI qualitative assessment component

# ---------------------------------------------------------------------------
# Local AI / VLM
# ---------------------------------------------------------------------------
ai:
  backend: ollama             # ollama | lmstudio
  ollama_url: http://localhost:11434
  lmstudio_url: http://localhost:1234
  visual_model: llava          # model for image analysis (VLM)
  text_model: llama3           # model for text/sentiment analysis
  embedding_model: nomic-embed-text  # model for semantic search embeddings
  timeout: 120
  max_tokens: 1024
  visual_weight: 0.6
  text_weight: 0.4
  max_images_per_property: 5
  max_description_chars: 1000
  output_language: "pt-br"

# ---------------------------------------------------------------------------
# GPU Resource Management
# ---------------------------------------------------------------------------
gpu:
  semaphore_limit: 1    # max concurrent GPU-bound tasks
  semaphore_name: gpu

# ---------------------------------------------------------------------------
# Proxy Configuration (scraper HTTP layer — FR-20 / AD-5)
# ---------------------------------------------------------------------------
# Operator enablement: set enabled: true and fill pool (or url), then restart
# scraper workers. Logs emit scraper_proxy_mode (host only, no credentials);
# Redis pipeline:scraper:*:status carries the same safe fields.
# Disable with enabled: false → next scrape is direct (no code change).
# Prefer env / local overrides for real credentials — never commit passwords.
# Platform extra.proxy (non-null) overrides this block; null/absent defers here.
# See docs/setup.md § Proxy rotation.
proxy:
  enabled: false
  url: null                             # single proxy URL (example only — use env for secrets)
  rotation_strategy: round_robin        # round_robin | random
  pool: []                              # list of proxy URLs for rotation
  # pool:
  #   - http://user:pass@proxy1.example:8080
  #   - http://user:pass@proxy2.example:8080

# ---------------------------------------------------------------------------
# Price-Drop Alerts
# ---------------------------------------------------------------------------
alerts:
  enabled: true
  min_drop_pct_default: 5.0   # alert when price drops ≥ 5%
  channels:
    - log                     # always log alerts
    - redis                   # push to Redis for frontend polling
    - email                   # send email alerts
  digest_mode: true           # if true, batch price-drop alerts into a daily email
  digest_email: admin@example.com
  smtp_host: localhost
  smtp_port: 1025
  smtp_user: ""
  smtp_pass: ""
  # Top-new-deals digest (BIN-52) — distinct from digest_mode / send_daily_digest
  top_deals:
    enabled: false
    limit: 10
    min_combined_score: 0.0
    lookback_hours: 168       # 7 days
    crontab_hour: 8
    crontab_minute: 0
    crontab_day_of_week: "0"  # Sunday
    redis_key: alerts:top_deals_digest

# ---------------------------------------------------------------------------
# Image Storage
# ---------------------------------------------------------------------------
image_storage_path: data/images

# ---------------------------------------------------------------------------
# Pipeline metrics snapshots (Dashboard history — BIN-61)
# ---------------------------------------------------------------------------
pipeline_metrics:
  snapshot_interval_sec: 30   # Celery beat interval for writing snapshots
  retention_days: 7           # prune snapshots older than this
