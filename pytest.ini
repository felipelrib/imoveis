[pytest]
minversion = 7.0
pythonpath = . src
testpaths = src/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (may require services)
    e2e: End-to-end tests (full workflow)
    slow: Tests that take a while
