name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ---- Lint (fastest feedback) ----
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python lint tools
        run: pip install isort flake8

      - name: Install Frontend deps
        run: npm ci --prefix frontend

      - name: isort check
        run: isort --check --diff src/

      - name: flake8
        run: flake8 src/ --max-line-length=127 --extend-ignore=E203,W503

      - name: eslint
        run: npm run lint --prefix frontend || echo "eslint not configured — skip"

  # ---- Unit tests (fast, no Docker) — runs in parallel with integration/contract ----
  unit:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov pytest-timeout

      - name: Run unit tests
        run: pytest src/tests/unit/ -v --cov=src --cov-report=xml --timeout=30

      - name: Upload coverage to Codecov
        if: success() || failure()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: SonarCloud Scan
        if: success() || failure()
        uses: SonarSource/sonarqube-scan-action@v4
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=felipelrib_imoveis
            -Dsonar.sources=src/
            -Dsonar.python.coverage.reportPaths=coverage.xml

  # ---- Integration (needs PostGIS + Redis) — runs in parallel with unit ----
  integration:
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:15-3.3-alpine
        env:
          POSTGRES_USER: imoveis
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: realestate
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U imoveis -d realestate"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt alembic

      - name: Run database migrations
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql://imoveis:test_password@localhost:5432/realestate

      - name: Run integration tests
        run: pytest src/tests/integration/ -v
        env:
          DATABASE_URL: postgresql://imoveis:test_password@localhost:5432/realestate
          REDIS_URL: redis://localhost:6379/0
          API_KEY: test-integration-key

  # ---- Contract tests (API schema + DB schema) — runs in parallel with unit ----
  contract:
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:15-3.3-alpine
        env:
          POSTGRES_USER: imoveis
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: realestate
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U imoveis -d realestate"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt alembic

      - name: Run contract tests
        run: pytest src/tests/contract/ -v
        env:
          DATABASE_URL: postgresql://imoveis:test_password@localhost:5432/realestate
          REDIS_URL: redis://localhost:6379/0

  # ---- E2E (Playwright) — PR gate + post-merge smoke test ----
  e2e:
    needs: [unit, integration]
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Frontend deps
        run: npm ci --prefix frontend

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e --prefix frontend

  # ---- Security scan (only on push to main) ----
  security-scan:
    needs: integration
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  # ---- Docs deploy (only on push to main) ----
  docs:
    needs: integration
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MkDocs
        run: pip install mkdocs-material

      - name: Deploy docs
        run: mkdocs gh-deploy --force
