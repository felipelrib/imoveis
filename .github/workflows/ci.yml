name: CI

on:
  pull_request:
    branches: [main]
    # Skip the heavy suite when the PR only touches docs/planning prose.
    # Docs-only PRs are gated by the Docs workflow (`docs` check) instead.
    paths-ignore:
      - "docs/**"
      - "mkdocs.yml"
      - "README.md"
      - "_bmad-output/**"
      - "_bmad/**"
      - ".agents/**"
      - "*.md"
      - "**/*.md"
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "mkdocs.yml"
      - "README.md"
      - "_bmad-output/**"
      - "_bmad/**"
      - ".agents/**"
      - "*.md"
      - "**/*.md"
  workflow_dispatch:

# Independent suites run in parallel. Merge still requires all required checks green;
# there is no artificial "wait for lint before tests" chain.
# Note: paths-ignore does not apply to workflow_dispatch — manual runs always execute.
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        run: npm ci --prefix frontend

      - name: Run pre-commit (matches local hooks exactly)
        uses: pre-commit/action@v3.0.1
        env:
          # Hook only makes sense on local commits; CI checkout is often on main.
          SKIP: no-commit-to-branch

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov pytest-timeout

      - name: Run unit tests
        run: pytest src/tests/unit/ -v --cov=src --cov-report=xml --timeout=30

      # Prefer CI-based Sonar (with coverage) over Automatic Analysis.
      - name: Disable SonarCloud Automatic Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          set -euo pipefail
          code=$(curl -sS -o /tmp/sonar-autoscan.json -w "%{http_code}" \
            -u "${SONAR_TOKEN}:" \
            -X POST \
            "https://sonarcloud.io/api/autoscan/activation?projectKey=felipelrib_imoveis&enable=false" || true)
          echo "autoscan API HTTP ${code}"
          cat /tmp/sonar-autoscan.json || true
          if [ "${code}" != "204" ] && [ "${code}" != "200" ]; then
            echo "::warning::Could not disable Automatic Analysis (HTTP ${code}). Turn it off in SonarCloud → Administration → Analysis Method."
          fi

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=felipelrib_imoveis
            -Dsonar.sources=src/
            -Dsonar.python.coverage.reportPaths=coverage.xml

  integration:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Start Postgres (PostGIS + pgvector)
        run: bash scripts/ci/start-postgres-pgvector.sh

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt alembic

      - name: Run database migrations
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql://imoveis:test_password@localhost:5432/realestate

      - name: Run integration tests
        run: pytest src/tests/integration/ -v
        env:
          DATABASE_URL: postgresql://imoveis:test_password@localhost:5432/realestate
          REDIS_URL: redis://localhost:6379/0
          API_KEY: test-integration-key
          JWT_SECRET: test-integration-jwt-secret

  contract:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Start Postgres (PostGIS + pgvector)
        run: bash scripts/ci/start-postgres-pgvector.sh

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt alembic

      - name: Run database migrations
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql://imoveis:test_password@localhost:5432/realestate

      - name: Run contract tests
        run: pytest src/tests/contract/ -v
        env:
          DATABASE_URL: postgresql://imoveis:test_password@localhost:5432/realestate
          REDIS_URL: redis://localhost:6379/0
          API_KEY: test-contract-key
          JWT_SECRET: test-contract-jwt-secret

  scrapers:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-timeout

      - name: Cassette unit tests + live dry-run
        run: bash scripts/agent/validate-scrapers.sh --require-live
        env:
          # Dummy DB URL so AppConfig validates when Redis CB loads config
          DATABASE_URL: postgresql://imoveis:test_password@localhost:5432/realestate
          REDIS_URL: redis://localhost:6379/0
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/src

  # Playwright uses page.route mocks — independent of backend test jobs
  e2e:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        run: npm ci --prefix frontend

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e --prefix frontend

  security-scan:
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  # MkDocs deploy lives in docs.yml (GitHub Pages). Do not duplicate here.
